<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #f2c4ce;
    --blush:   #fde8ed;
    --lilac:   #e8d5f5;
    --sky:     #d5e8f5;
    --mint:    #d5f5e8;
    --butter:  #fdf5d5;
    --cream:   #fdf8f5;
    --text:    #5a4a52;
    --soft:    #b09aa8;
    --white:   #ffffff;
    --shadow:  rgba(180,140,160,0.15);
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fde8ed 0%, #f5e8fd 35%, #e8edf5 70%, #fdf5e8 100%);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #f2c4ce, #e8d5f5);
    top: -100px; left: -100px;
    animation: float1 8s ease-in-out infinite;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #d5e8f5, #d5f5e8);
    bottom: -80px; right: -80px;
    animation: float2 10s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(180,140,160,0.08);
    width: 100%; max-width: 480px;
    padding: 2.4rem 2rem 2rem;
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

  .header { text-align: center; margin-bottom: 1.8rem; }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    font-size: 2.2rem;
    color: var(--text);
    letter-spacing: .02em;
    line-height: 1.1;
  }
  .header h1 span { color: #c07090; font-weight: 500; }
  .tagline {
    font-size: .78rem; font-weight: 300;
    color: var(--soft); letter-spacing: .12em; text-transform: uppercase;
    margin-top: .3rem;
  }

  .date-nav {
    display: flex; align-items: center; justify-content: center; gap: .8rem;
    margin-bottom: 1.6rem;
  }
  .nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--blush);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #c07090; font-size: 1rem;
    transition: background .2s, transform .15s;
  }
  .nav-btn:hover { background: var(--rose); transform: scale(1.1); }
  .date-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 400;
    color: var(--text); letter-spacing: .04em;
    min-width: 180px; text-align: center;
  }
  .date-display .weekday {
    display: block; font-size: .72rem; font-style: italic;
    color: var(--soft); letter-spacing: .1em; margin-top: .1rem;
  }

  .progress-wrap { margin-bottom: 1.8rem; }
  .progress-info {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: .5rem;
  }
  .progress-label { font-size: .78rem; font-weight: 500; color: var(--soft); letter-spacing: .08em; text-transform: uppercase; }
  .progress-pct { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: #c07090; font-weight: 500; }
  .progress-bar-bg {
    height: 8px; border-radius: 99px;
    background: var(--blush);
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #f2c4ce, #c07090);
    transition: width .5s cubic-bezier(.22,1,.36,1);
  }

  .activities { display: flex; flex-direction: column; gap: .75rem; }

  .activity-item {
    background: rgba(255,255,255,0.8);
    border: 1.5px solid rgba(240,200,215,0.5);
    border-radius: 16px;
    padding: .9rem 1rem;
    display: flex; flex-direction: column; gap: .5rem;
    transition: box-shadow .2s, border-color .2s, transform .15s;
    animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
  }
  .activity-item:hover { box-shadow: 0 4px 18px var(--shadow); transform: translateY(-1px); }
  .activity-item.done {
    background: linear-gradient(135deg, rgba(242,196,206,.18), rgba(232,213,245,.18));
    border-color: rgba(192,112,144,.35);
  }
  .activity-item.no-count {
    border-style: dashed;
    border-color: rgba(240,200,215,0.4);
    background: rgba(255,255,255,0.6);
  }

  .activity-row { display: flex; align-items: center; gap: .75rem; }

  .check-btn {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 50%; border: 2px solid #e8c0ce;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; color: transparent; font-size: .85rem;
  }
  .check-btn:hover { border-color: #c07090; background: var(--blush); }
  .activity-item.done .check-btn {
    background: linear-gradient(135deg, #f2c4ce, #c07090);
    border-color: #c07090; color: white;
  }

  .emoji { font-size: 1.2rem; flex-shrink: 0; }

  .activity-name {
    flex: 1; font-size: .92rem; font-weight: 400; color: var(--text);
    transition: color .2s;
  }
  .activity-item.done .activity-name { color: var(--soft); text-decoration: line-through; text-decoration-color: #e8c0ce; }

  .no-count-badge {
    font-size: .65rem; color: var(--soft); letter-spacing: .06em;
    background: var(--blush); border-radius: 99px; padding: .15rem .5rem;
    white-space: nowrap; flex-shrink: 0;
  }

  .action-btns { display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }

  .obs-toggle {
    background: none; border: none; cursor: pointer;
    font-size: .72rem; color: var(--soft); letter-spacing: .06em;
    text-transform: uppercase; font-family: 'DM Sans', sans-serif;
    padding: 0;
    display: flex; align-items: center; gap: .3rem;
    transition: color .2s;
  }
  .obs-toggle:hover { color: #c07090; }
  .obs-toggle svg { transition: transform .2s; }
  .obs-toggle.open svg { transform: rotate(180deg); }

  .delete-btn {
    background: none; border: none; cursor: pointer;
    font-size: .8rem; color: #e8c0ce;
    display: flex; align-items: center;
    transition: color .2s, transform .15s;
    padding: 0;
  }
  .delete-btn:hover { color: #c07090; transform: scale(1.2); }

  .obs-field { display: none; animation: slideDown .25s ease both; }
  .obs-field.open { display: block; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  .obs-input {
    width: 100%; border: 1.5px solid rgba(240,200,215,.6);
    border-radius: 10px; padding: .5rem .75rem;
    font-family: 'DM Sans', sans-serif; font-size: .85rem;
    color: var(--text); background: rgba(255,255,255,.7);
    resize: none; outline: none; min-height: 52px;
    transition: border-color .2s;
  }
  .obs-input::placeholder { color: #d4b0bc; }
  .obs-input:focus { border-color: #e8a0b8; }

  .section-label {
    font-size: .7rem; font-weight: 500; color: var(--soft);
    letter-spacing: .12em; text-transform: uppercase;
    margin: 1.2rem 0 .5rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(240,200,215,.5); }

  .add-section { margin-top: 1.4rem; }
  .add-row { display: flex; gap: .6rem; }
  .add-emoji-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--blush); border: 1.5px solid rgba(240,200,215,.6);
    font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
    transition: background .2s;
  }
  .add-emoji-btn:hover { background: var(--rose); }
  .add-input {
    flex: 1; border: 1.5px solid rgba(240,200,215,.6);
    border-radius: 12px; padding: .5rem .9rem;
    font-family: 'DM Sans', sans-serif; font-size: .9rem;
    color: var(--text); background: rgba(255,255,255,.7);
    outline: none; transition: border-color .2s;
  }
  .add-input::placeholder { color: #d4b0bc; }
  .add-input:focus { border-color: #e8a0b8; }
  .add-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, #f2c4ce, #c07090);
    border: none; color: white; font-size: 1.3rem;
    cursor: pointer; flex-shrink: 0;
    transition: opacity .2s, transform .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .add-btn:hover { opacity: .88; transform: scale(1.05); }

  .add-options { display: flex; gap: .4rem; margin-top: .6rem; flex-wrap: wrap; align-items: center; }
  .add-options-label { font-size: .72rem; color: var(--soft); letter-spacing: .06em; white-space: nowrap; }
  .add-option-btn {
    font-size: .72rem; padding: .28rem .6rem; border-radius: 99px;
    border: 1.5px solid rgba(240,200,215,.6);
    background: rgba(255,255,255,.7); color: var(--soft);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all .2s; letter-spacing: .03em;
  }
  .add-option-btn:hover { background: var(--blush); border-color: #e8a0b8; color: #c07090; }
  .add-option-btn.active { background: var(--blush); border-color: #e8a0b8; color: #c07090; font-weight: 500; }

  .emoji-picker {
    display: none; flex-wrap: wrap; gap: .4rem;
    margin-top: .6rem; padding: .7rem;
    background: rgba(255,255,255,.9); border-radius: 14px;
    border: 1.5px solid rgba(240,200,215,.5);
    box-shadow: 0 4px 20px var(--shadow);
  }
  .emoji-picker.open { display: flex; }
  .emoji-opt {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: var(--blush); cursor: pointer; font-size: 1.05rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
  }
  .emoji-opt:hover { background: var(--rose); transform: scale(1.15); }

  .footer-note {
    text-align: center; margin-top: 1.8rem;
    font-size: .72rem; color: #d4b0bc; letter-spacing: .08em;
  }
  .empty-day {
    text-align: center; padding: 1.5rem;
    color: var(--soft); font-size: .88rem; font-style: italic; line-height: 1.8;
  }
</style>
</head>
<body>
<div class="card">

  <div class="header">
    <h1>meu <span>planner</span> ✦</h1>
    <p class="tagline">cada dia, um recomeço</p>
  </div>

  <div class="date-nav">
    <button class="nav-btn" onclick="changeDate(-1)">&#8249;</button>
    <div class="date-display">
      <span id="dateText">—</span>
      <span class="weekday" id="weekdayText">—</span>
    </div>
    <button class="nav-btn" onclick="changeDate(1)">&#8250;</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span class="progress-label">progresso do dia</span>
      <span class="progress-pct" id="pctText">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <div class="activities" id="activitiesList"></div>

  <div class="add-section">
    <div class="section-label">adicionar atividade</div>
    <div class="add-row">
      <button class="add-emoji-btn" id="emojiToggle" onclick="toggleEmojiPicker()">⭐</button>
      <input class="add-input" id="newActivityInput" placeholder="Nova atividade…" onkeydown="if(event.key==='Enter') addActivity()">
      <button class="add-btn" onclick="addActivity()">+</button>
    </div>
    <div class="add-options" id="daySelector">
      <span class="add-options-label">dias:</span>
      <button class="add-option-btn" data-day="0" onclick="toggleDay(this)">Dom</button>
      <button class="add-option-btn active" data-day="1" onclick="toggleDay(this)">Seg</button>
      <button class="add-option-btn active" data-day="2" onclick="toggleDay(this)">Ter</button>
      <button class="add-option-btn active" data-day="3" onclick="toggleDay(this)">Qua</button>
      <button class="add-option-btn active" data-day="4" onclick="toggleDay(this)">Qui</button>
      <button class="add-option-btn active" data-day="5" onclick="toggleDay(this)">Sex</button>
      <button class="add-option-btn" data-day="6" onclick="toggleDay(this)">Sáb</button>
    </div>
    <div class="add-options">
      <button class="add-option-btn" id="noCountToggle" onclick="toggleNoCount()">✦ não contar no progresso</button>
    </div>
    <div class="emoji-picker" id="emojiPicker"></div>
  </div>

  <p class="footer-note">✦ seus dados ficam salvos no navegador ✦</p>
</div>

<script>
const EMOJIS = ['📖','🏋️','☀️','🏠','📚','✏️','💧','🧘','🎨','🍎','💊','🛁','🌙','🎵','🧹','🛒','💌','🌸','⭐','🦋','🌿','💪','🙏','✨','🎯','📝','👟','🏃','🥗','🫧'];
const WEEKDAYS = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MONTHS   = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

// 0=Dom 1=Seg 2=Ter 3=Qua 4=Qui 5=Sex 6=Sáb
const DEFAULT_ACTIVITIES = [
  { id: 1, emoji: '📖', name: 'Devocional',     days: [0,1,2,3,4,5,6], countProgress: true  },
  { id: 2, emoji: '🏋️', name: 'Musculação',      days: [1,2,4,5],       countProgress: true  },
  { id: 3, emoji: '🏃', name: 'Cardio',          days: [1,3,6],         countProgress: true  },
  { id: 4, emoji: '☀️', name: 'Tomar sol',       days: [0,1,2,3,4,5,6], countProgress: true  },
  { id: 5, emoji: '🏠', name: 'Culto no lar',    days: [3],             countProgress: true  },
  { id: 6, emoji: '📚', name: 'Leitura',         days: [0,1,2,3,4,5,6], countProgress: true  },
  { id: 7, emoji: '👟', name: '8 mil passos',    days: [0,1,2,3,4,5,6], countProgress: true  },
  { id: 9, emoji: '💑', name: 'Orar com o marido', days: [0,1,2,3,4,5,6], countProgress: true  },
  { id: 8, emoji: '🍎', name: 'Alimentação',     days: [0,1,2,3,4,5,6], countProgress: false },
];

let currentDate = new Date();
currentDate.setHours(0,0,0,0);
let selectedEmoji = '⭐';
let newActivityDays = [1,2,3,4,5];
let newActivityNoCount = false;

function dateKey(d) { return `${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`; }
function storageKey(d) { return `planner_states_${dateKey(d)}`; }
function deletedKey(d) { return `planner_deleted_${dateKey(d)}`; }
function customKey(d)  { return `planner_custom_${dateKey(d)}`; }

function getStates(d)  { try { return JSON.parse(localStorage.getItem(storageKey(d))) || {}; } catch { return {}; } }
function setStates(d,o){ localStorage.setItem(storageKey(d), JSON.stringify(o)); }
function getDeleted(d) { try { return JSON.parse(localStorage.getItem(deletedKey(d))) || []; } catch { return []; } }
function setDeleted(d,a){ localStorage.setItem(deletedKey(d), JSON.stringify(a)); }
function getCustom(d)  { try { return JSON.parse(localStorage.getItem(customKey(d))) || []; } catch { return []; } }
function setCustom(d,a){ localStorage.setItem(customKey(d), JSON.stringify(a)); }

function buildDayActivities(d) {
  const dow = d.getDay();
  const deleted = getDeleted(d);
  const custom  = getCustom(d);
  const states  = getStates(d);
  const defaults = DEFAULT_ACTIVITIES
    .filter(a => a.days.includes(dow) && !deleted.includes(a.id))
    .map(a => ({ ...a, done: !!states[a.id], obs: states[`obs_${a.id}`] || '' }));
  const customs = custom.map(a => ({ ...a, done: !!states[a.id], obs: states[`obs_${a.id}`] || '' }));
  return [...defaults, ...customs];
}

function render() {
  updateDateDisplay();
  const activities = buildDayActivities(currentDate);
  renderActivities(activities);
  updateProgress(activities);
}

function updateDateDisplay() {
  const d = currentDate;
  document.getElementById('dateText').textContent =
    `${String(d.getDate()).padStart(2,'0')} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
  document.getElementById('weekdayText').textContent = WEEKDAYS[d.getDay()];
}

function renderActivities(activities) {
  const list = document.getElementById('activitiesList');
  list.innerHTML = '';
  if (!activities.length) {
    list.innerHTML = '<p class="empty-day">Nenhuma atividade para hoje 🌸<br>Adicione uma abaixo!</p>';
    return;
  }
  const countable   = activities.filter(a => a.countProgress);
  const uncountable = activities.filter(a => !a.countProgress);
  countable.forEach((act, i) => list.appendChild(makeItem(act, i)));
  if (uncountable.length) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = 'acompanhamento';
    list.appendChild(lbl);
    uncountable.forEach((act, i) => list.appendChild(makeItem(act, i)));
  }
}

function makeItem(act, i) {
  const item = document.createElement('div');
  item.className = 'activity-item' + (act.done ? ' done' : '') + (!act.countProgress ? ' no-count' : '');
  item.style.animationDelay = `${i * 0.06}s`;
  item.innerHTML = `
    <div class="activity-row">
      <button class="check-btn" onclick="toggleDone(${act.id})">✓</button>
      <span class="emoji">${act.emoji}</span>
      <span class="activity-name">${act.name}</span>
      ${!act.countProgress ? '<span class="no-count-badge">livre</span>' : ''}
      <div class="action-btns">
        <button class="obs-toggle" id="obsToggle_${act.id}" onclick="toggleObs(${act.id})">
          obs
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="#b09aa8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="delete-btn" onclick="deleteActivity(${act.id})" title="Remover hoje">✕</button>
      </div>
    </div>
    <div class="obs-field${act.obs ? ' open' : ''}" id="obsField_${act.id}">
      <textarea class="obs-input" placeholder="Adicione uma observação…" oninput="saveObs(${act.id}, this.value)">${act.obs}</textarea>
    </div>
  `;
  return item;
}

function updateProgress(activities) {
  const countable = activities.filter(a => a.countProgress);
  const done = countable.filter(a => a.done).length;
  const pct = countable.length ? Math.round(done / countable.length * 100) : 0;
  document.getElementById('pctText').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function toggleDone(id) {
  const s = getStates(currentDate);
  s[id] = !s[id];
  setStates(currentDate, s);
  render();
}

function toggleObs(id) {
  document.getElementById(`obsField_${id}`).classList.toggle('open');
  document.getElementById(`obsToggle_${id}`).classList.toggle('open');
}

function saveObs(id, val) {
  const s = getStates(currentDate);
  s[`obs_${id}`] = val;
  setStates(currentDate, s);
  updateProgress(buildDayActivities(currentDate));
}

function deleteActivity(id) {
  if (DEFAULT_ACTIVITIES.find(a => a.id === id)) {
    const del = getDeleted(currentDate);
    if (!del.includes(id)) del.push(id);
    setDeleted(currentDate, del);
  } else {
    setCustom(currentDate, getCustom(currentDate).filter(a => a.id !== id));
  }
  render();
}

function changeDate(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  render();
}

function addActivity() {
  const input = document.getElementById('newActivityInput');
  const name = input.value.trim();
  if (!name) return;
  const custom = getCustom(currentDate);
  custom.push({ id: Date.now(), emoji: selectedEmoji, name, days: [...newActivityDays], countProgress: !newActivityNoCount });
  setCustom(currentDate, custom);
  input.value = '';
  render();
}

function toggleDay(btn) {
  btn.classList.toggle('active');
  newActivityDays = Array.from(document.querySelectorAll('#daySelector .add-option-btn.active')).map(b => parseInt(b.dataset.day));
}

function toggleNoCount() {
  newActivityNoCount = !newActivityNoCount;
  document.getElementById('noCountToggle').classList.toggle('active', newActivityNoCount);
}

function buildEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt';
    btn.textContent = em;
    btn.onclick = () => { selectedEmoji = em; document.getElementById('emojiToggle').textContent = em; picker.classList.remove('open'); };
    picker.appendChild(btn);
  });
}
function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('open'); }

buildEmojiPicker();
render();
</script>
</body>
</html>
